<!DOCTYPE html>
<html>
<head>
<title>Operations</title>
<script>
function factorial(n) {
    let fact = 1;
    for(let i = 1; i <= n; i++) {
        fact *= i;
    }
    return fact;
}

function fibonacci(n) {
    let a = 0, b = 1, arr = [0,1];
    if(n === 1) return [0];
    for(let i = 2; i < n; i++) {
        let next = a + b;
        arr.push(next);
        a = b;
        b = next;
    }
    return arr;
}

function primeNumber(n) {
    let primes = [];
    for(let i = 2; i <= n; i++) {
        let flag = true;
        for(let j = 2; j <= Math.sqrt(i); j++) {
            if(i % j === 0) {
                flag = false;
                break;
            }
        }
        if(flag) primes.push(i);
    }
    return primes;
}

function palindrome(n) {
    let s = n.toString();
    return s === s.split("").reverse().join("");
}

function showfactorial() {
    let n = parseInt(document.getElementById("num").value);
    document.getElementById("result").innerHTML = "Factorial = " + factorial(n);
}

function showfibonacci() {
    let n = parseInt(document.getElementById("num").value);
    document.getElementById("result").innerHTML = "Fibonacci = " + fibonacci(n);
}

function showprime() {
    let n = parseInt(document.getElementById("num").value);
    document.getElementById("result").innerHTML = "Primes = " + primeNumber(n);
}

function showpalindrome() {
    let n = document.getElementById("num").value;
    let res = palindrome(n) ? "Palindrome" : "Not Palindrome";
    document.getElementById("result").innerHTML = res;
}
</script>
</head>
<body>
<h2>Functions Operations</h2>
Enter Number: <input type="text" id="num"><br><br>
<button onclick="showfactorial()">Factorial</button>
<button onclick="showfibonacci()">Fibonacci</button>
<button onclick="showprime()">Prime</button>
<button onclick="showpalindrome()">Palindrome</button>
<p id="result"></p>
</body>
</html>
